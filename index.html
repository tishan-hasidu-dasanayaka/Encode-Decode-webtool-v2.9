<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptor Pro Elite - v2.9 Aero PWA</title>
    
    <!-- PWA Web Manifest Link -->
    <link rel="manifest" id="pwa-manifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/preset-bubbles@3.0.2/tsparticles.preset.bubbles.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.0.2/tsparticles.bundle.min.js"></script>

    <style>
        :root {
            --bg-color: #070a13;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #00f2fe;
            --accent-pink: #ff007f;
            --safe: #4ade80;
            --danger: #f87171;
            --input-bg: rgba(0, 0, 0, 0.3);
            --btn-text: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.15);
            --text-main: #0f172a;
            --text-sub: #334155;
            --accent: #0ea5e9;
            --accent-pink: #db2777;
            --input-bg: rgba(15, 23, 42, 0.06);
            --btn-text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; color: var(--text-main); overflow-x: hidden;
        }

        #tsparticles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .container {
            width: 100%; max-width: 650px; 
            background: var(--glass-bg); backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            position: relative; z-index: 5;
        }

        .history-sidebar {
            position: fixed; left: -300px; top: 0; width: 290px; height: 100%; 
            background: var(--glass-bg); backdrop-filter: blur(35px); border-right: 1px solid var(--glass-border);
            padding: 20px; transition: 0.4s; z-index: 100; color: var(--text-main);
        }
        .history-sidebar.open { left: 0; }
        .history-item { 
            background: var(--input-bg); padding: 12px; border-radius: 12px; margin-bottom: 12px; 
            font-size: 0.75rem; border: 1px solid var(--glass-border); color: var(--text-main);
        }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand h2 { font-size: 1.5rem; letter-spacing: -0.5px; color: var(--text-main); }
        .brand i { color: var(--accent); }
        
        .password-box input, textarea {
            width: 100%; padding: 15px; background: var(--input-bg);
            border: 1px solid var(--glass-border); border-radius: 15px; 
            color: var(--text-main); outline: none; font-size: 0.9rem;
        }
        textarea::placeholder, input::placeholder { color: var(--text-sub); opacity: 0.8; }

        .password-box { position: relative; width: 100%; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-main); cursor: pointer; }

        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }
        
        /* Utility Action Bar - Line by Line එක අයින් කරලා Inline කළා */
        .action-bar {
            display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px;
        }

        .btn-mini { 
            padding: 6px 12px; font-size: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border);
            background: var(--input-bg); color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-mini:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn-primary {
            width: 100%; padding: 15px; border: none; border-radius: 18px; margin-top: 20px;
            background: linear-gradient(45deg, var(--accent-pink), #7928ca); color: var(--btn-text);
            font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(255,0,127,0.2); transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* PWA Install Button Styling */
        #pwa-install-btn {
            background: linear-gradient(45deg, #00f2fe, #4ade80); color: #000; font-weight: 600; display: none; margin-top: 10px;
        }

        .security-panel { 
            background: var(--input-bg); border-radius: 15px; padding: 15px; margin-top: 20px; 
            font-size: 0.75rem; font-family: 'Fira Code', monospace; display: none; border: 1px solid var(--glass-border);
        }
        .sec-title { color: var(--accent); font-weight: 600; margin-bottom: 8px; display: block; }

        .qr-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center; z-index:1000; }
        .qr-modal { background: white; padding: 25px; border-radius: 25px; text-align: center; color: black; }
        
        .toast { position: fixed; top: 30px; right: 20px; background: var(--safe); color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 600; transform: translateX(200%); transition: 0.4s; z-index: 200; }
        .toast.show { transform: translateX(0); }

        .strength-meter { height: 5px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-top: 10px; }
        .strength-bar { height: 100%; border-radius: 10px; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="qr-overlay" id="qr-modal" onclick="closeQR()">
        <div class="qr-modal" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:15px; color:#000;">Encrypted QR</h3>
            <div id="qrcode"></div>
            <button class="btn-primary" style="margin-top:15px; padding:8px; color:#fff;" onclick="closeQR()">Close</button>
        </div>
    </div>

    <div class="history-sidebar" id="sidebar">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px">
            <h3>History</h3>
            <button class="btn-mini" onclick="toggleSidebar()"><i class="fa-solid fa-x"></i></button>
        </div>
        <div id="history-list"></div>
    </div>

    <div class="container">
        <div class="header-area">
            <button class="btn-mini" onclick="toggleSidebar()"><i class="fa-solid fa-clock-rotate-left"></i></button>
            <div class="brand">
                <h2><i class="fa-solid fa-terminal"></i> Cryptor <span style="color:var(--accent)">Aero</span></h2>
            </div>
            <button class="btn-mini" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>

        <!-- Mode Switcher -->
        <div style="display:flex; background:var(--input-bg); padding:5px; border-radius:15px; margin-bottom:20px;">
            <button id="tab-enc" class="btn-primary" style="margin:0; padding:10px; background:var(--glass-bg); box-shadow:none;" onclick="setMode('enc')">Encrypt</button>
            <button id="tab-dec" class="btn-primary" style="margin:0; padding:10px; background:transparent; box-shadow:none; color:var(--text-main);" onclick="setMode('dec')">Decrypt</button>
        </div>

        <div style="display:flex; gap:20px; font-size:0.85rem; margin-bottom:15px; padding-left:5px">
            <label style="cursor:pointer"><input type="radio" name="algo" value="base64" checked onchange="toggleAlgo()"> Base64</label>
            <label style="cursor:pointer"><input type="radio" name="algo" value="aes" onchange="toggleAlgo()"> AES-256 (Hardened)</label>
        </div>

        <div id="pwd-section" style="display:none; margin-bottom:20px">
            <div class="password-box">
                <input type="password" id="passkey" placeholder="Enter Secure Passphrase..." oninput="checkStrength()">
                <button class="eye-btn" onclick="toggleEye()"><i class="fa-solid fa-eye" id="eye-icon"></i></button>
            </div>
            <div class="strength-meter"><div id="s-bar" class="strength-bar"></div></div>
        </div>

        <!-- Input Section -->
        <div class="input-group">
            <div class="label-row"><span>Input Payload</span><span id="char-in">0 chars</span></div>
            <textarea id="txt-in" placeholder="Type text or paste data here..." oninput="handleInput()"></textarea>
            <div class="action-bar">
                <button class="btn-mini" onclick="pasteText()"><i class="fa-solid fa-paste"></i> Paste</button>
                <button class="btn-mini" onclick="clearField('txt-in')"><i class="fa-solid fa-trash"></i> Clear</button>
            </div>
        </div>

        <div style="height:15px"></div>

        <!-- Output Section -->
        <div class="input-group">
            <div class="label-row"><span>Secure Result</span><span id="char-out">0 chars</span></div>
            <textarea id="txt-out" placeholder="Output will appear here..." readonly></textarea>
            <div class="action-bar">
                <button class="btn-mini" onclick="generateQR()"><i class="fa-solid fa-qrcode"></i> QR</button>
                <button class="btn-mini" onclick="copyText()"><i class="fa-solid fa-copy"></i> Copy</button>
                <button class="btn-mini" onclick="downloadFile()"><i class="fa-solid fa-file-arrow-down"></i> Save</button>
            </div>
        </div>

        <div id="security-panel" class="security-panel">
            <span class="sec-title">Protocol Specifications:</span>
            <div id="telemetry-data" style="color:var(--text-sub); line-height:1.6"></div>
        </div>

        <button class="btn-primary" id="main-action" onclick="execute()">Execute Protocol</button>
        
        <!-- PWA Native Install Button -->
        <button class="btn-primary" id="pwa-install-btn" onclick="triggerPwaInstall()">
            <i class="fa-solid fa-download"></i> Install Cryptor Aero App
        </button>
    </div>

    <div class="toast" id="toast">Task Complete!</div>

    <script>
        // --- PWA Core Configurations (Inline Manifest & Service Worker) ---
        const manifestData = {
            "short_name": "CryptorAero",
            "name": "Cryptor Pro Elite - Aero Edition",
            "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/508/508284.png", "type": "image/png", "sizes": "512x512" }],
            "start_url": ".",
            "background_color": "#070a13",
            "theme_color": "#00f2fe",
            "display": "standalone",
            "orientation": "portrait"
        };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/manifest+json,' + JSON.stringify(manifestData));

        // Inject Offline Service Worker Code via Blob Object
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'cryptor-aero-v2.9';
                const ASSETS = [window.location.href, window.location.pathname];
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-btn').style.display = 'block';
        });

        function triggerPwaInstall() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    document.getElementById('pwa-install-btn').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }

        // --- tsParticles Background Configuration ---
        async function loadParticles() {
            if (typeof tsParticles === 'undefined') return;
            await tsParticles.load("tsparticles", {
                particles: {
                    number: { value: 50, density: { enable: true, value_area: 800 } },
                    color: { value: ["#00f2fe", "#ff007f"] },
                    shape: { type: "circle" },
                    opacity: { value: 0.3, random: true },
                    size: { value: 3, random: true },
                    move: { enable: true, speed: 1.2, direction: "none", random: true, out_mode: "out" },
                    links: { enable: true, distance: 150, color: "#94a3b8", opacity: 0.08, width: 1 }
                },
                interactivity: { events: { onhover: { enable: true, mode: "grab" } } },
                retina_detect: true
            });
        }
        loadParticles();

        // --- Crypto & Logic Architecture ---
        let currentMode = 'enc';
        let history = JSON.parse(localStorage.getItem('crypt_history_v29')) || [];

        function execute() {
            const input = document.getElementById('txt-in').value.trim();
            const algo = document.querySelector('input[name="algo"]:checked').value;
            const key = document.getElementById('passkey').value;
            const output = document.getElementById('txt-out');

            if(!input) return notify("Input payload is empty!", 'danger');

            try {
                if(algo === 'base64') {
                    output.value = currentMode === 'enc' ? btoa(unescape(encodeURIComponent(input))) : decodeURIComponent(escape(atob(input)));
                    notify("Base64 Protocol Ran");
                } else {
                    if(!key) return notify("Passphrase required!", 'danger');
                    if(currentMode === 'enc') {
                        const salt = CryptoJS.lib.WordArray.random(128/8);
                        const iv = CryptoJS.lib.WordArray.random(128/8);
                        const dKey = CryptoJS.PBKDF2(key, salt, { keySize: 256/32, iterations: 10000 });
                        const encrypted = CryptoJS.AES.encrypt(input, dKey, { iv: iv });
                        const package = btoa(JSON.stringify({ ct: encrypted.toString(), s: CryptoJS.enc.Hex.stringify(salt), i: CryptoJS.enc.Hex.stringify(iv) }));
                        
                        output.value = package;
                        document.getElementById('security-panel').style.display = 'block';
                        document.getElementById('telemetry-data').innerHTML = `Protocol: AES-256-CBC Hardened<br>Telemetry Node: ${package.substring(0, 30)}...`;
                        saveHistory(input.substring(0, 15), package.substring(0, 15));
                        notify("Payload Encrypted");
                    } else {
                        const raw = JSON.parse(atob(input));
                        const salt = CryptoJS.enc.Hex.parse(raw.s);
                        const iv = CryptoJS.enc.Hex.parse(raw.i);
                        const dKey = CryptoJS.PBKDF2(key, salt, { keySize: 256/32, iterations: 10000 });
                        const decrypted = CryptoJS.AES.decrypt(raw.ct, dKey, { iv: iv });
                        const plain = decrypted.toString(CryptoJS.enc.Utf8);
                        if(!plain) throw new Error();
                        output.value = plain;
                        notify("Payload Decrypted");
                    }
                }
                updateCounts();
            } catch(e) {
                notify("Decryption Error! Bad key or format.", 'danger');
            }
        }

        // --- Core UI Mechanisms ---
        function setMode(m) {
            currentMode = m;
            document.getElementById('tab-enc').style.background = m === 'enc' ? 'var(--glass-bg)' : 'transparent';
            document.getElementById('tab-dec').style.background = m === 'dec' ? 'var(--glass-bg)' : 'transparent';
            document.getElementById('main-action').innerText = m === 'enc' ? 'Run Encryption Protocol' : 'Run Decryption Protocol';
        }

        function toggleAlgo() {
            document.getElementById('pwd-section').style.display = document.querySelector('input[name="algo"]:checked').value === 'aes' ? 'block' : 'none';
        }

        function toggleTheme() {
            const doc = document.documentElement;
            doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
            loadParticles();
        }

        function toggleEye() {
            const p = document.getElementById('passkey');
            p.type = p.type === 'password' ? 'text' : 'password';
            document.getElementById('eye-icon').className = p.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function checkStrength() {
            const pwd = document.getElementById('passkey').value;
            const bar = document.getElementById('s-bar');
            let s = 0; if(pwd.length > 7) s += 30; if(/[A-Z]/.test(pwd)) s += 30; if(/[0-9]/.test(pwd)) s += 40;
            bar.style.width = s + "%"; bar.style.background = s < 50 ? 'var(--danger)' : 'var(--safe)';
        }

        function generateQR() {
            const val = document.getElementById('txt-out').value; if(!val) return notify("No output payload available", 'danger');
            document.getElementById('qr-modal').style.display = 'flex';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: val, width: 180, height: 180 });
        }
        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); renderHistory(); }
        function saveHistory(i, o) { history.unshift({t: new Date().toLocaleTimeString(), d: o}); if(history.length > 8) history.pop(); localStorage.setItem('crypt_history_v29', JSON.stringify(history)); }
        function renderHistory() { document.getElementById('history-list').innerHTML = history.map(h => `<div class="history-item"><strong>${h.t}</strong><br>${h.d}...</div>`).join(''); }

        function notify(msg, type='success') {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.style.background = type === 'success' ? 'var(--safe)' : 'var(--danger)';
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
        }

        function copyText() { navigator.clipboard.writeText(document.getElementById('txt-out').value); notify("Copied to clipboard!"); }
        async function pasteText() { document.getElementById('txt-in').value = await navigator.clipboard.readText(); updateCounts(); }
        function clearField(id) { document.getElementById(id).value = ''; updateCounts(); }
        function updateCounts() {
            document.getElementById('char-in').innerText = document.getElementById('txt-in').value.length + " chars";
            document.getElementById('char-out').innerText = document.getElementById('txt-out').value.length + " chars";
        }
        function handleInput() { updateCounts(); }
        function downloadFile() {
            const txt = document.getElementById('txt-out').value; if(!txt) return;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([txt], {type: 'text/plain'}));
            a.download = `payload-${Date.now()}.txt`; a.click();
        }
    </script>
</body>
</html>
